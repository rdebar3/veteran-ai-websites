<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monti · Trades Template (multi-page)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     MONTI — TRADES TEMPLATE (MULTI-PAGE)
     A FIXED, DESIGNED FRAME set. Monti fills the §3 DATA once and
     it populates EVERY page. Monti also decides HOW MANY pages a
     business gets, based on how much it has to show (see pagesFor).
     A rich business → full 5-page site; a simple one → 3 pages.
     Never thin, never padded — always right-sized.
     ============================================================ */
  :root, [data-palette="ember"]{
    --bg:#f7f4ef; --surface:#fff; --ink:#20242b; --muted:#6f665c; --line:#e8e1d6;
    --accent:#c2532a; --accent-d:#a5451f; --dark:#191c22; --dark-2:#111318; --gold:#c9a24b;
    --ph1:#3a546e; --ph2:#c4966e;
  }
  [data-palette="timber"]{
    --bg:#f5f6f2; --surface:#fff; --ink:#1c231e; --muted:#606a60; --line:#e0e6dd;
    --accent:#2f6b46; --accent-d:#245537; --dark:#16211a; --dark-2:#0f1712; --gold:#c9a24b;
    --ph1:#2f4a3a; --ph2:#8aa06f;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0}
  .site{color:var(--ink);background:var(--bg);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:clip}
  .site a{color:inherit;text-decoration:none}
  .wrap{max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,44px)}
  h1,h2,h3{font-family:Fraunces,Georgia,serif;font-weight:600}
  .kicker{font-size:12.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin:0 0 14px}
  .btn{display:inline-flex;align-items:center;gap:9px;font-weight:600;font-size:15.5px;padding:15px 26px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:transform .2s,box-shadow .2s,background .2s}
  .btn--primary{background:var(--accent);color:#fff;box-shadow:0 12px 26px -8px color-mix(in srgb,var(--accent) 60%,transparent)}
  .btn--primary:hover{background:var(--accent-d);transform:translateY(-2px)}
  .btn--ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn--ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn--ondark{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.25)}
  .btn--dark{background:var(--dark);color:#fff}
  .img{position:relative;overflow:hidden;background:linear-gradient(140deg,var(--ph1),var(--ph2))}
  .img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}

  /* header */
  .hdr{position:fixed;top:0;left:0;right:0;z-index:60;transition:background .35s,box-shadow .35s,border-color .35s;border-bottom:1px solid transparent}
  .hdr-in{display:flex;align-items:center;justify-content:space-between;height:72px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:18px;color:#fff;cursor:pointer;transition:color .35s}
  .brand-mark{display:grid;place-items:center;width:36px;height:36px;border-radius:9px;background:var(--accent);color:#fff;font-family:Fraunces,serif;font-weight:700;font-size:16px}
  .nav{display:flex;align-items:center;gap:26px}
  .nav a{font-size:14px;font-weight:500;color:rgba(255,255,255,.82);cursor:pointer;transition:color .2s;position:relative;padding:4px 0}
  .nav a:hover{color:#fff}
  .nav a.on{color:#fff}
  .nav a.on::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--accent)}
  .hdr .call{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);color:#fff;font-weight:600;font-size:14px;padding:9px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.22)}
  .hdr.solid{background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom-color:var(--line);box-shadow:0 8px 30px -20px rgba(0,0,0,.4)}
  .hdr.solid .brand{color:var(--ink)}
  .hdr.solid .nav a{color:var(--muted)}
  .hdr.solid .nav a:hover,.hdr.solid .nav a.on{color:var(--ink)}
  .hdr.solid .call{background:var(--accent);border-color:var(--accent)}
  @media(max-width:900px){.nav{display:none}}

  /* home hero */
  .hero{position:relative;min-height:88vh;display:flex;align-items:flex-end;color:#fff;isolation:isolate}
  .hero .img{position:absolute;inset:0;z-index:-2}
  .hero .img img{animation:kb 22s ease-out both}
  @keyframes kb{from{transform:scale(1.02)}to{transform:scale(1.14)}}
  .hero .scrim{position:absolute;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(15,18,24,.4),rgba(15,18,24,.1) 34%,rgba(15,18,24,.6) 82%,rgba(15,18,24,.85)),linear-gradient(90deg,rgba(15,18,24,.5),transparent 60%)}
  .hero-in{padding-bottom:clamp(52px,8vh,96px);padding-top:120px;max-width:760px}
  .chip{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);padding:8px 14px;border-radius:999px;margin-bottom:22px}
  .hero h1{font-size:clamp(38px,6vw,74px);line-height:1.02;letter-spacing:-.02em;margin:0;text-wrap:balance;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hero .lead{margin:22px 0 0;max-width:52ch;font-size:clamp(16px,1.4vw,19px);line-height:1.6;color:rgba(255,255,255,.9)}
  .hero-cta{margin-top:30px;display:flex;flex-wrap:wrap;gap:14px}
  .hero-trust{margin-top:28px;display:flex;flex-wrap:wrap;gap:10px 24px;font-size:13.5px;color:rgba(255,255,255,.86)}
  .hero-trust span{display:inline-flex;align-items:center;gap:8px}.hero-trust b{color:var(--gold)}

  /* inner page hero */
  .phero{position:relative;color:#fff;isolation:isolate;padding:148px 0 62px;text-align:center}
  .phero .img{position:absolute;inset:0;z-index:-2}
  .phero .img img{filter:brightness(.7)}
  .phero .scrim{position:absolute;inset:0;z-index:-1;background:linear-gradient(0deg,rgba(15,18,24,.72),rgba(15,18,24,.5))}
  .phero h1{font-size:clamp(32px,5vw,54px);margin:0;letter-spacing:-.02em}
  .phero p{margin:14px auto 0;max-width:52ch;color:rgba(255,255,255,.9);font-size:17px;line-height:1.55}

  .trustbar{background:var(--dark);color:#fff}
  .trustbar-in{display:flex;flex-wrap:wrap;justify-content:space-between;gap:20px 24px;padding:26px 0}
  .tstat{flex:1 1 160px;text-align:center;display:flex;flex-direction:column;gap:4px}
  .tstat b{font-family:Fraunces,serif;font-size:clamp(20px,2.6vw,30px)}
  .tstat span{font-size:12.5px;color:rgba(255,255,255,.66)}
  .tstat+.tstat{border-left:1px solid rgba(255,255,255,.1)}
  @media(max-width:640px){.tstat+.tstat{border-left:none}.tstat{flex-basis:44%}}

  .sec{padding:clamp(58px,8vw,104px) 0}
  .sec--tint{background:linear-gradient(180deg,var(--bg),color-mix(in srgb,var(--accent) 5%,var(--bg)))}
  .head{max-width:640px;margin:0 0 clamp(34px,5vw,50px)}
  .head.center{margin-left:auto;margin-right:auto;text-align:center}
  .title{font-size:clamp(28px,4vw,44px);line-height:1.08;letter-spacing:-.02em;margin:0}
  .head .sub{margin:16px 0 0;font-size:17.5px;line-height:1.6;color:var(--muted)}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(258px,1fr));gap:18px}
  .card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:28px 26px;overflow:hidden;transition:transform .28s,box-shadow .28s,border-color .28s}
  .card::before{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .3s}
  .card:hover{transform:translateY(-5px);box-shadow:0 30px 50px -28px rgba(0,0,0,.28);border-color:transparent}
  .card:hover::before{transform:scaleX(1)}
  .card .ic{display:grid;place-items:center;width:50px;height:50px;border-radius:12px;background:color-mix(in srgb,var(--accent) 12%,var(--surface));color:var(--accent);margin-bottom:18px;font-size:22px}
  .card h3{font-size:20px;margin:0 0 9px}
  .card p{font-size:14.5px;line-height:1.58;color:var(--muted);margin:0}

  .feature{display:grid;grid-template-columns:1.05fr 1fr;gap:clamp(30px,5vw,68px);align-items:center}
  .feature .img{aspect-ratio:4/3;border-radius:20px;box-shadow:0 40px 70px -34px rgba(0,0,0,.4)}
  .feature h2{font-size:clamp(26px,3.4vw,40px);line-height:1.08;margin:0 0 18px}
  .feature p{font-size:17px;line-height:1.66;color:var(--muted);margin:0 0 22px}
  .points{list-style:none;margin:0 0 26px;padding:0;display:flex;flex-direction:column;gap:13px}
  .points li{display:flex;align-items:center;gap:12px;font-size:15.5px;font-weight:500}
  .points li i{display:grid;place-items:center;width:30px;height:30px;border-radius:8px;background:color-mix(in srgb,var(--accent) 13%,var(--bg));color:var(--accent);flex:0 0 auto;font-style:normal;font-weight:800;font-size:14px}
  @media(max-width:860px){.feature{grid-template-columns:1fr}}

  .band-photo{position:relative;color:#fff;isolation:isolate}
  .band-photo .img{position:absolute;inset:0;z-index:-2}
  .band-photo .scrim{position:absolute;inset:0;z-index:-1;background:linear-gradient(90deg,rgba(15,18,24,.8),rgba(15,18,24,.42))}
  .band-photo .inner{padding:clamp(64px,10vw,130px) 0;max-width:620px}
  .band-photo h2{font-size:clamp(26px,3.6vw,42px);line-height:1.12;margin:0 0 14px}
  .band-photo p{font-size:17.5px;line-height:1.6;color:rgba(255,255,255,.86);margin:0}

  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(20px,3vw,40px)}
  .step{position:relative}
  .step .n{font-family:Fraunces,serif;font-size:15px;font-weight:700;color:var(--accent)}
  .step h4{font-size:20px;margin:12px 0 8px;font-family:Fraunces,serif}
  .step p{font-size:15px;line-height:1.58;color:var(--muted);margin:0}
  .step::before{content:"";position:absolute;top:-6px;left:0;width:40px;height:3px;border-radius:3px;background:var(--accent)}
  @media(max-width:760px){.steps{grid-template-columns:1fr;gap:26px}}

  .reviews{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
  .rev{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:30px;display:flex;flex-direction:column}
  .rev .stars{color:var(--gold);letter-spacing:3px;font-size:15px;margin-bottom:14px}
  .rev q{font-family:Fraunces,serif;font-size:18px;line-height:1.5;font-style:italic;quotes:none;display:block;margin:0 0 18px}
  .rev .who{font-size:14px;font-weight:600;margin-top:auto}
  .rev .who span{display:block;font-weight:400;color:var(--muted);font-size:13px;margin-top:2px}

  /* contact */
  .contact{display:grid;grid-template-columns:1fr 1fr;gap:clamp(30px,5vw,60px);align-items:start}
  .form{display:grid;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:13.5px;font-weight:600}
  .field input,.field textarea{font-family:inherit;font-size:15px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .field textarea{min-height:110px;resize:vertical}
  .cinfo{display:flex;flex-direction:column;gap:20px}
  .cinfo .row{display:flex;gap:13px;align-items:flex-start}
  .cinfo .row i{display:grid;place-items:center;width:40px;height:40px;border-radius:10px;background:color-mix(in srgb,var(--accent) 12%,var(--bg));color:var(--accent);flex:0 0 auto;font-style:normal;font-size:18px}
  .cinfo .row .l{font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .cinfo .row .v{font-family:Fraunces,serif;font-size:18px}
  .map{margin-top:6px;border-radius:14px;overflow:hidden;border:1px solid var(--line);aspect-ratio:16/8;position:relative;background:
     repeating-linear-gradient(0deg,color-mix(in srgb,var(--accent) 7%,var(--bg)),color-mix(in srgb,var(--accent) 7%,var(--bg)) 22px,transparent 22px,transparent 44px),
     repeating-linear-gradient(90deg,color-mix(in srgb,var(--accent) 7%,var(--bg)),color-mix(in srgb,var(--accent) 7%,var(--bg)) 22px,transparent 22px,transparent 44px),var(--bg)}
  .map .pin{position:absolute;left:50%;top:48%;transform:translate(-50%,-100%);color:var(--accent);font-size:30px}
  .map .lab{position:absolute;left:50%;top:58%;transform:translateX(-50%);font-size:13px;font-weight:600;background:var(--surface);padding:5px 12px;border-radius:999px;border:1px solid var(--line)}
  .done{background:color-mix(in srgb,var(--accent) 8%,var(--surface));border:1px solid var(--line);border-radius:14px;padding:26px;text-align:center}
  @media(max-width:820px){.contact{grid-template-columns:1fr}}

  .cta-band{position:relative;background:var(--dark);color:#fff;border-radius:26px;padding:clamp(44px,7vw,84px);text-align:center;overflow:hidden}
  .cta-band .glow{position:absolute;inset:0;background:radial-gradient(60% 80% at 80% 0%,color-mix(in srgb,var(--accent) 45%,transparent),transparent 62%);pointer-events:none}
  .cta-band h2{position:relative;font-size:clamp(28px,4.4vw,50px);line-height:1.06;margin:0}
  .cta-band p{position:relative;margin:16px auto 0;max-width:48ch;font-size:17.5px;color:rgba(255,255,255,.82)}
  .cta-band .row{position:relative;margin-top:32px;display:flex;flex-wrap:wrap;gap:14px;justify-content:center}

  .ft{background:var(--dark-2);color:rgba(255,255,255,.72);padding:56px 0 30px}
  .ft-grid{display:flex;flex-wrap:wrap;gap:30px 64px;justify-content:space-between;margin-bottom:34px}
  .ft h5{color:#fff;font-size:14px;font-weight:700;margin:0 0 13px}
  .ft p{font-size:14.5px;line-height:1.85;margin:0}
  .ft a{cursor:pointer}.ft a:hover{color:#fff}
  .ft-nav{display:flex;flex-direction:column;gap:7px}
  .ft-bottom{border-top:1px solid rgba(255,255,255,.12);padding-top:20px;display:flex;flex-wrap:wrap;gap:8px 20px;justify-content:space-between;font-size:12.5px;color:rgba(255,255,255,.5)}

  .reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
  .reveal.in{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none}.hero .img img{animation:none}}

  .harness{position:fixed;z-index:200;left:50%;transform:translateX(-50%);bottom:14px;display:flex;gap:7px;align-items:center;background:#0f172a;color:#fff;padding:9px 11px;border-radius:13px;box-shadow:0 18px 50px rgba(0,0,0,.45);font-family:Inter,sans-serif;font-size:12.5px;flex-wrap:wrap;justify-content:center;max-width:94vw}
  .harness .lbl{color:#8b97a9;font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:10.5px}
  .harness button{background:#1e293b;color:#cbd5e1;border:1px solid #334155;border-radius:8px;padding:7px 11px;font-size:12.5px;font-weight:600;cursor:pointer}
  .harness button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .harness .sep{width:1px;height:20px;background:#334155;margin:0 3px}
  .harness .note{color:#8b97a9;font-size:11px}
</style>
</head>
<body>
<div class="site" id="site" data-palette="ember"></div>

<div class="harness">
  <span class="lbl">Business</span>
  <button id="b-full" class="on" onclick="pick('full')">Rich (5 pages)</button>
  <button id="b-sparse" onclick="pick('sparse')">Simple (3 pages)</button>
  <span class="sep"></span>
  <span class="lbl">Palette</span>
  <button id="p-ember" class="on" onclick="pal('ember')">Ember</button>
  <button id="p-timber" onclick="pal('timber')">Timber</button>
</div>

<script>
const U='https://images.unsplash.com/photo-';
const PRESET={hero:'w=3840&h=2160&fit=crop&crop=entropy&q=80&fm=jpg',feature:'w=2000&h=1500&fit=crop&crop=entropy&q=80&fm=jpg',band:'w=3840&h=1400&fit=crop&crop=entropy&q=80&fm=jpg'};
const IMG={landscaping:'1689728318937-17d24bc0a65c',towing:'1742069029207-0aacf8fa4401',plumbing:'1676210133055-eab6ef033ce3',hvac:'1660330589693-99889d60181e',electrical:'1621905251189-08b45d6a269e',roofing:'1632759145351-1d592919f522',auto:'1631720040176-0d789a643a78',cleaning:'1758273705627-937374bfa978',wv_hero:'1661823331212-28e241c85291',wv_band:'1698787273825-90bd24e90eb0',work_truck:'1564355172839-be57081c219f'};

const SAMPLES={
  full:{ template_id:"trades", palette:"ember",
    business:{name:"Mountain State Landscaping", phone:"(304) 555-0148", service_area:"Buckhannon · Elkins · Weston", established:2009},
    hero:{ image_id:"landscaping", headline:"Yards worth coming home to.", subhead:"Design, hardscaping, and clean weekly care from a crew that treats your property like their own — all across north-central West Virginia.", cta_text:"Get a free quote" },
    about:{ body:"We're a family-run crew out of Upshur County. Fifteen years turning tired yards into the best-looking place on the street — honest quotes, tidy work, and no surprises when the bill comes. When you call us, you reach the people doing the work, not a call center three states away." },
    services:[
      {title:"Landscape Design", description:"Custom plans that fit your yard, your style, and your budget — start to finish."},
      {title:"Hardscaping & Patios", description:"Paver patios, retaining walls, and walkways built to last decades."},
      {title:"Weekly Lawn Care", description:"Mowing, edging, and cleanup on a schedule you can count on."},
      {title:"Mulch & Planting", description:"Fresh beds, healthy plants, and mulch that ties the whole yard together."},
      {title:"Seasonal Cleanup", description:"Spring and fall cleanups that keep your property sharp year-round."},
      {title:"Retaining Walls", description:"Engineered walls that hold the hillside and look great doing it."}
    ],
    trust:{ badges:["Licensed & Insured","Family-Owned","Since 2009","Free Estimates"],
      reviews:[
        {quote:"They redid our whole front yard in two days and it looks incredible. Fair price, spotless cleanup.", name:"Karen M.", detail:"Buckhannon, WV"},
        {quote:"Best-looking lawn on the street now. On time every single week, rain or shine.", name:"Dwayne P.", detail:"Elkins, WV"},
        {quote:"Built us a paver patio we use every night now. Craftsmanship you can see.", name:"The Coles", detail:"Weston, WV"}
      ] },
    contact:{ cta_text:"Get a free quote", phone_prompt:"Call for a same-week estimate", emergency:false }
  },
  sparse:{ template_id:"trades", palette:"ember",
    business:{name:"Ridgeline Towing", phone:"(304) 555-0173", service_area:"I-79 & central WV", established:null},
    hero:{ image_id:"towing", headline:"Stuck on the side of the road? We're on the way.", subhead:"24/7 towing and recovery across central West Virginia.", cta_text:"Call now" },
    about:{ body:"Local, dependable, and always answering the phone — day or night." },
    services:[
      {title:"24/7 Towing", description:"Fast response any hour, anywhere on the mountain."},
      {title:"Roadside Assistance", description:"Jump-starts, lockouts, fuel, and flat tires."},
      {title:"Recovery & Winch-Outs", description:"Off-road, ditch, and mud recovery done safely."}
    ],
    trust:{ badges:[], reviews:[] },
    contact:{ cta_text:"Call now", phone_prompt:"Answered 24/7", emergency:true }
  }
};

const cap=(s,n)=>{s=(s==null?'':String(s)).trim();return s.length>n?s.slice(0,n-1).trimEnd()+'…':s;};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const imgTag=(name,preset,alt)=>`<div class="img"><img src="${IMG[name]?(U+IMG[name]+'?'+PRESET[preset]):''}" alt="${esc(alt)}" loading="lazy" onerror="this.style.display='none'"></div>`;

/* ---- Monti decides the page count from the business's substance ---- */
function pagesFor(d){
  const pages=[{id:'home',label:'Home'}];
  if((d.services||[]).length) pages.push({id:'services',label:'Services'});
  if((d.about?.body||'').length>140) pages.push({id:'about',label:'About'}); // enough of a story to earn its own page
  if((d.trust?.reviews||[]).length) pages.push({id:'reviews',label:'Reviews'});
  pages.push({id:'contact',label:'Contact'});
  return pages;
}

let state={page:'home', sample:'full', palette:'ember', sent:false};

function ctx(){
  const d=SAMPLES[state.sample], b=d.business||{};
  return {d,b,
    tel:'tel:'+String(b.phone||'').replace(/[^0-9+]/g,''),
    initials:(b.name||'?').split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase(),
    heroImg:d.hero?.image_id&&IMG[d.hero.image_id]?d.hero.image_id:'wv_hero',
    heroCta:cap(d.hero?.cta_text,22)||'Get a quote',
    contactCta:cap(d.contact?.cta_text,22)||'Get a quote',
    phonePrompt:cap(d.contact?.phone_prompt,40)||'Call for a free estimate',
    services:(d.services||[]).slice(0,6), badges:(d.trust?.badges||[]).slice(0,4),
    reviews:(d.trust?.reviews||[]).slice(0,3), emergency:!!d.contact?.emergency, est:b.established};
}

function header(pages){
  const {b,tel,initials}=ctx();
  return `<header class="hdr" id="hdr"><div class="wrap hdr-in">
    <div class="brand" onclick="go('home')"><span class="brand-mark">${esc(initials)}</span>${esc(cap(b.name,30))}</div>
    <nav class="nav">${pages.filter(p=>p.id!=='home').map(p=>`<a class="${state.page===p.id?'on':''}" onclick="go('${p.id}')">${p.label}</a>`).join('')}</nav>
    <a href="${tel}" class="call">☎ ${esc(b.phone||'')}</a>
  </div></header>`;
}
function footer(pages){
  const {b,tel,est,initials}=ctx();
  return `<footer class="ft"><div class="wrap">
    <div class="ft-grid">
      <div style="max-width:30ch"><div class="brand" style="color:#fff;margin-bottom:12px"><span class="brand-mark">${esc(initials)}</span>${esc(cap(b.name,30))}</div><p>Honest, professional work for the mountains of West Virginia.</p></div>
      <div><h5>PAGES</h5><div class="ft-nav">${pages.map(p=>`<a onclick="go('${p.id}')">${p.label}</a>`).join('')}</div></div>
      <div><h5>CONTACT</h5><p><a href="${tel}">${esc(b.phone||'')}</a><br>${esc(cap(b.service_area,50))}</p></div>
    </div>
    <div class="ft-bottom"><span>© ${esc(cap(b.name,40))}${est?(' · Since '+esc(est)):''}</span><span>Site by Veteran AI Websites</span></div>
  </div></footer>`;
}
function ctaBand(){
  const {tel,b,contactCta,phonePrompt,emergency}=ctx();
  return `<section class="sec"><div class="wrap"><div class="cta-band reveal"><div class="glow"></div>
    <h2>${emergency?"Need help now? We're standing by.":"Let's get your project started."}</h2>
    <p>${esc(phonePrompt)}.</p>
    <div class="row"><a href="${tel}" class="btn btn--primary">☎ ${esc(b.phone||'')}</a><a onclick="go('contact')" class="btn btn--ondark">${esc(contactCta)}</a></div>
  </div></div></section>`;
}
function trustStrip(){
  const {badges}=ctx();
  const tb=badges.length?badges.map(x=>`<div class="tstat"><b>✓</b><span>${esc(cap(x,24))}</span></div>`).join('')
    :`<div class="tstat"><b>Local</b><span>& family-owned</span></div><div class="tstat"><b>Fast</b><span>response, done right</span></div><div class="tstat"><b>Honest</b><span>upfront pricing</span></div><div class="tstat"><b>WV</b><span>owned & operated</span></div>`;
  return `<section class="trustbar"><div class="wrap trustbar-in">${tb}</div></section>`;
}
function servicesGrid(list){
  return `<div class="grid">${list.map((s,i)=>`<div class="card reveal" style="transition-delay:${i*55}ms"><span class="ic">◆</span><h3>${esc(cap(s.title,30))}</h3><p>${esc(cap(s.description,120))}</p></div>`).join('')}</div>`;
}

/* ---- Pages ---- */
function pageHome(){
  const {d,b,tel,heroImg,heroCta,services,est}=ctx();
  return `
  <section class="hero">${imgTag(heroImg,'hero',b.name)}<div class="scrim"></div>
    <div class="wrap hero-in">
      <span class="chip">◆ ${esc(cap(b.service_area,46))||'Serving West Virginia'}</span>
      <h1>${esc(cap(d.hero?.headline,64))}</h1>
      <p class="lead">${esc(cap(d.hero?.subhead,150))}</p>
      <div class="hero-cta"><a onclick="go('contact')" class="btn btn--primary">${esc(heroCta)}</a><a href="${tel}" class="btn btn--ghost" style="color:#fff;border-color:rgba(255,255,255,.35)">☎ ${esc(b.phone||'')}</a></div>
      <div class="hero-trust"><span><b>✓</b> Licensed & insured</span><span><b>✓</b> Upfront pricing</span><span><b>✓</b> ${est?('Since '+esc(est)):'Local crew'}</span></div>
    </div>
  </section>
  ${trustStrip()}
  <section class="sec"><div class="wrap">
    <div class="head reveal"><p class="kicker">What we do</p><h2 class="title">Every job, done right the first time.</h2></div>
    ${servicesGrid(services.slice(0,3))}
    <div style="margin-top:28px"><a onclick="go('services')" class="btn btn--dark">See all services →</a></div>
  </div></section>
  <section class="band-photo">${imgTag('wv_band','band',b.service_area)}<div class="scrim"></div>
    <div class="wrap inner reveal"><h2>Proud to work where we live.</h2><p>Born and raised in these mountains — the same hills you call home. When you hire us, you're hiring a neighbor.</p></div>
  </section>
  ${ctx().reviews.length?`<section class="sec sec--tint"><div class="wrap"><div class="head center reveal"><p class="kicker">Reviews</p><h2 class="title">Trusted across WV.</h2></div><div class="reviews">${ctx().reviews.slice(0,2).map(r=>`<div class="rev reveal"><div class="stars">★★★★★</div><q>${esc(cap(r.quote,150))}</q><div class="who">${esc(cap(r.name,28))}<span>${esc(cap(r.detail,32))}</span></div></div>`).join('')}</div><div style="text-align:center;margin-top:26px"><a onclick="go('reviews')" class="btn btn--ghost">Read more reviews</a></div></div></section>`:``}
  ${ctaBand()}`;
}
function pageServices(){
  const {b,services,heroImg}=ctx();
  return `
  <section class="phero">${imgTag(heroImg,'band',b.name)}<div class="scrim"></div><div class="wrap"><h1>Our Services</h1><p>Everything we do, done right the first time — for homes and businesses across West Virginia.</p></div></section>
  <section class="sec"><div class="wrap">${servicesGrid(services)}</div></section>
  <section class="sec sec--tint"><div class="wrap"><div class="head reveal"><p class="kicker">How it works</p><h2 class="title">Simple, from first call to clean-up.</h2></div>
    <div class="steps">
      <div class="step reveal"><span class="n">01</span><h4>Reach out</h4><p>Call or drop a message. We give you a straight answer and a real time — no runaround.</p></div>
      <div class="step reveal" style="transition-delay:80ms"><span class="n">02</span><h4>We show up prepared</h4><p>A clean, uniformed crew arrives on time with the right tools for the job.</p></div>
      <div class="step reveal" style="transition-delay:160ms"><span class="n">03</span><h4>Done & guaranteed</h4><p>We finish right, clean up after ourselves, and stand behind the work.</p></div>
    </div></div></section>
  ${ctaBand()}`;
}
function pageAbout(){
  const {d,b,est}=ctx();
  return `
  <section class="phero">${imgTag('work_truck','band',b.name)}<div class="scrim"></div><div class="wrap"><h1>About ${esc(cap(b.name,30))}</h1><p>A real local crew — not a call center.</p></div></section>
  <section class="sec"><div class="wrap"><div class="feature">
    <div class="img reveal">${imgTag('work_truck','feature',b.name+' — local crew')}</div>
    <div class="reveal"><p class="kicker">Our story</p><h2>Built on showing up and doing it right.</h2><p>${esc(cap(d.about?.body,400))}</p>
      <ul class="points"><li><i>✓</i> Straight answers and honest quotes</li><li><i>✓</i> Clean, and respectful of your property</li><li><i>✓</i> Work we stand behind, every time</li></ul>
      <a onclick="go('contact')" class="btn btn--primary">${esc(ctx().contactCta)}</a></div>
  </div></div></section>
  ${ctx().badges.length?`<section class="trustbar"><div class="wrap trustbar-in">${ctx().badges.map(x=>`<div class="tstat"><b>✓</b><span>${esc(cap(x,24))}</span></div>`).join('')}</div></section>`:``}
  <section class="band-photo">${imgTag('wv_band','band',b.service_area)}<div class="scrim"></div><div class="wrap inner reveal"><h2>Proud to work where we live.</h2><p>${est?('Serving our neighbors since '+esc(est)+'.'):'Born and raised in these mountains — when you hire us, you hire a neighbor.'}</p></div></section>
  ${ctaBand()}`;
}
function pageReviews(){
  const {b,reviews,heroImg}=ctx();
  return `
  <section class="phero">${imgTag(heroImg,'band',b.name)}<div class="scrim"></div><div class="wrap"><h1>What our customers say</h1><p>Real words from real neighbors across West Virginia.</p></div></section>
  <section class="sec"><div class="wrap"><div class="reviews">${reviews.map((r,i)=>`<div class="rev reveal" style="transition-delay:${i*60}ms"><div class="stars">★★★★★</div><q>${esc(cap(r.quote,200))}</q><div class="who">${esc(cap(r.name,28))}<span>${esc(cap(r.detail,32))}</span></div></div>`).join('')}</div></div></section>
  ${ctaBand()}`;
}
function pageContact(){
  const {b,tel,phonePrompt,est}=ctx();
  const form = state.sent
    ? `<div class="done"><div style="font-size:34px;color:var(--accent)">✓</div><h3 style="margin:8px 0 6px">Thanks — we got it!</h3><p style="color:var(--muted);margin:0">We'll reach out to you at ${esc(b.phone||'your number')} shortly.</p></div>`
    : `<form class="form" onsubmit="submitForm(event)">
        <div class="field"><label>Your name</label><input required placeholder="Jane Smith"></div>
        <div class="field"><label>Phone</label><input required type="tel" placeholder="${esc(b.phone||'(304) 555-0000')}"></div>
        <div class="field"><label>What do you need?</label><textarea placeholder="Tell us a little about the job…"></textarea></div>
        <button class="btn btn--primary" type="submit" style="justify-content:center">Send it over</button>
        <p style="font-size:12.5px;color:var(--muted);text-align:center;margin:2px 0 0">No spam, ever. We only use this to reach you about your request.</p>
      </form>`;
  return `
  <section class="phero">${imgTag('wv_hero','band',b.name)}<div class="scrim"></div><div class="wrap"><h1>Get in touch</h1><p>${esc(phonePrompt)}.</p></div></section>
  <section class="sec"><div class="wrap"><div class="contact">
    <div>${form}</div>
    <div class="cinfo">
      <div class="row"><i>☎</i><div><div class="l">Call or text</div><div class="v"><a href="${tel}">${esc(b.phone||'')}</a></div></div></div>
      <div class="row"><i>◉</i><div><div class="l">Service area</div><div class="v">${esc(cap(b.service_area,40))}</div></div></div>
      ${est?`<div class="row"><i>★</i><div><div class="l">Serving since</div><div class="v">${esc(est)}</div></div></div>`:``}
      <div class="map"><div class="pin">◉</div><div class="lab">${esc(cap(b.service_area,34))||'West Virginia'}</div></div>
    </div>
  </div></div></section>`;
}

const PAGES={home:pageHome,services:pageServices,about:pageAbout,reviews:pageReviews,contact:pageContact};

function render(){
  const d=SAMPLES[state.sample];
  const pages=pagesFor(d);
  if(!pages.find(p=>p.id===state.page)) state.page='home';
  const body=(PAGES[state.page]||pageHome)();
  document.getElementById('site').innerHTML=header(pages)+body+footer(pages);
  wireScroll();
}
function wireScroll(){
  const hdr=document.getElementById('hdr');
  const onScroll=()=>hdr.classList.toggle('solid',window.scrollY>60);
  window.onscroll=onScroll; onScroll();
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.1});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}
function go(p){ state.page=p; state.sent=false; render(); window.scrollTo(0,0); }
function submitForm(e){ e.preventDefault(); state.sent=true; render(); window.scrollTo(0,0); }
function pick(k){ state.sample=k; state.page='home'; state.sent=false; render(); window.scrollTo(0,0);
  document.getElementById('b-full').classList.toggle('on',k==='full');
  document.getElementById('b-sparse').classList.toggle('on',k==='sparse'); }
function pal(p){ state.palette=p; document.getElementById('site').dataset.palette=p;
  document.getElementById('p-ember').classList.toggle('on',p==='ember');
  document.getElementById('p-timber').classList.toggle('on',p==='timber'); }
render();
</script>
</body>
</html>
