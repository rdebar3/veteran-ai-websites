<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monti · Food & Hospitality Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     MONTI — FOOD & HOSPITALITY TEMPLATE
     A FIXED, DESIGNED FRAME. Monti supplies only the §3 DATA
     (same contract as Trades) and the frame renders it through
     designed slots WITH FALLBACKS. Food treatment: hours + menu
     + atmosphere up front, big appetite-forward photography.
     ============================================================ */

  :root, [data-palette="hearth"]{
    --bg:#f8f3ea; --surface:#fffdf9; --ink:#241c17; --muted:#6e6055; --line:#e7ddcd;
    --accent:#a6321f; --accent-d:#882716;
    --dark:#1c1613; --dark-2:#140f0d; --gold:#c99a3b; --ph1:#3a2a22; --ph2:#a6714a;
  }
  [data-palette="amber"]{
    --bg:#f8f4ec; --surface:#fffdf8; --ink:#211d15; --muted:#6b6152; --line:#e8dfce;
    --accent:#c0862a; --accent-d:#9e6c1c; --dark:#191510; --dark-2:#110e0a; --gold:#c99a3b;
    --ph1:#33281a; --ph2:#b1863f;
  }

  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0}
  .site{color:var(--ink);background:var(--bg);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:clip}
  .site a{color:inherit;text-decoration:none}
  .wrap{max-width:1180px;margin:0 auto;padding:0 clamp(20px,5vw,44px)}
  h1,h2,h3,h4{font-family:Fraunces,Georgia,serif;font-weight:600}
  .kicker{font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin:0 0 14px}

  .btn{display:inline-flex;align-items:center;gap:9px;font-weight:600;font-size:15px;padding:14px 27px;border-radius:2px;cursor:pointer;border:1px solid transparent;letter-spacing:.02em;transition:transform .2s ease,background .2s ease,color .2s ease,border-color .2s}
  .btn--primary{background:var(--accent);color:#fff}
  .btn--primary:hover{background:var(--accent-d);transform:translateY(-2px)}
  .btn--outline{background:transparent;color:var(--ink);border-color:var(--ink)}
  .btn--outline:hover{background:var(--ink);color:var(--bg)}
  .btn--onlight{background:transparent;color:#fff;border-color:rgba(255,255,255,.5)}
  .btn--onlight:hover{background:#fff;color:var(--dark)}

  .img{position:relative;overflow:hidden;background:linear-gradient(140deg,var(--ph1),var(--ph2))}
  .img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}

  /* header */
  .hdr{position:fixed;top:0;left:0;right:0;z-index:60;transition:background .35s,box-shadow .35s;border-bottom:1px solid transparent}
  .hdr-in{display:flex;align-items:center;justify-content:space-between;height:78px}
  .brand{font-family:Fraunces,serif;font-weight:600;font-size:23px;letter-spacing:.01em;color:#fff;transition:color .35s}
  .nav{display:flex;align-items:center;gap:32px}
  .nav a{font-size:14px;font-weight:500;letter-spacing:.02em;color:rgba(255,255,255,.85);transition:color .2s}
  .nav a:hover{color:#fff}
  .hdr .book{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.5);color:#fff;font-weight:600;font-size:13.5px;padding:9px 18px;border-radius:2px;letter-spacing:.04em;transition:background .2s,color .2s}
  .hdr .book:hover{background:#fff;color:var(--dark)}
  .hdr.solid{background:var(--dark);box-shadow:0 10px 34px -20px rgba(0,0,0,.6)}
  @media(max-width:840px){.nav{display:none}}

  /* hero */
  .hero{position:relative;min-height:94vh;display:flex;align-items:center;text-align:center;justify-content:center;color:#fff;isolation:isolate}
  .hero .img{position:absolute;inset:0;z-index:-2}
  .hero .img img{animation:kb 24s ease-out both}
  @keyframes kb{from{transform:scale(1.03)}to{transform:scale(1.15)}}
  .hero .scrim{position:absolute;inset:0;z-index:-1;background:radial-gradient(120% 100% at 50% 40%,rgba(15,12,10,.28),rgba(15,12,10,.62) 75%),linear-gradient(0deg,rgba(15,12,10,.7),transparent 60%)}
  .hero-in{max-width:820px;padding:120px 20px 60px}
  .hero .loc{font-size:12.5px;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.9);margin:0 0 20px}
  .hero h1{font-size:clamp(42px,7vw,88px);line-height:1;letter-spacing:-.01em;margin:0;font-weight:600;text-wrap:balance;
           display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .hero .tag{margin:22px auto 0;max-width:44ch;font-size:clamp(16px,1.5vw,19px);line-height:1.6;color:rgba(255,255,255,.92);
             display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .hero-cta{margin-top:34px;display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
  .hero .hours-chip{margin-top:26px;font-size:13px;letter-spacing:.04em;color:rgba(255,255,255,.85);display:inline-flex;align-items:center;gap:9px}
  .hero .hours-chip .dot{width:7px;height:7px;border-radius:50%;background:#7bd39a;box-shadow:0 0 0 4px rgba(123,211,154,.2)}

  /* info bar */
  .info{background:var(--dark);color:#fff}
  .info-in{display:flex;flex-wrap:wrap;justify-content:center;gap:14px 48px;padding:22px 0;text-align:center}
  .info-item{display:flex;flex-direction:column;gap:3px;min-width:120px}
  .info-item .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
  .info-item .val{font-size:15px;font-family:Fraunces,serif;color:#fff}

  /* sections */
  .sec{padding:clamp(64px,9vw,120px) 0}
  .sec--tint{background:linear-gradient(180deg,var(--bg),color-mix(in srgb,var(--accent) 5%,var(--bg)))}
  .head{max-width:660px;margin:0 auto clamp(40px,6vw,60px);text-align:center}
  .title{font-size:clamp(30px,4.4vw,50px);line-height:1.05;letter-spacing:-.01em;margin:0;color:var(--ink)}
  .head .sub{margin:16px auto 0;font-size:17px;line-height:1.6;color:var(--muted);max-width:52ch}
  .rule{width:54px;height:2px;background:var(--accent);margin:18px auto 0}

  /* menu */
  .menu{display:grid;grid-template-columns:1fr 1fr;gap:8px clamp(40px,6vw,80px)}
  .mi{display:flex;justify-content:space-between;gap:16px;align-items:baseline;padding:18px 0;border-bottom:1px solid var(--line)}
  .mi-l{min-width:0}
  .mi h4{font-size:19px;margin:0 0 5px;color:var(--ink);font-weight:600}
  .mi p{font-size:14px;line-height:1.5;color:var(--muted);margin:0;
        display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  @media(max-width:760px){.menu{grid-template-columns:1fr;gap:0}}

  /* feature */
  .feature{display:grid;grid-template-columns:1fr 1fr;gap:clamp(30px,5vw,70px);align-items:center}
  .feature .img{aspect-ratio:4/5;border-radius:3px;box-shadow:0 40px 70px -34px rgba(30,15,10,.5)}
  .feature h2{font-size:clamp(28px,3.6vw,42px);line-height:1.06;margin:0 0 18px;color:var(--ink)}
  .feature p{font-size:17px;line-height:1.7;color:var(--muted);margin:0 0 24px}
  @media(max-width:840px){.feature{grid-template-columns:1fr}.feature .img{aspect-ratio:16/10}}

  /* cinematic band */
  .band{position:relative;color:#fff;text-align:center;isolation:isolate}
  .band .img{position:absolute;inset:0;z-index:-2}
  .band .img img{filter:brightness(.62)}
  .band .scrim{position:absolute;inset:0;z-index:-1;background:linear-gradient(0deg,rgba(15,12,10,.5),rgba(15,12,10,.3))}
  .band .inner{padding:clamp(80px,13vw,170px) 20px;max-width:720px;margin:0 auto}
  .band h2{font-size:clamp(28px,4vw,48px);font-style:italic;font-weight:400;line-height:1.2;margin:0}
  .band .by{margin:18px 0 0;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.8)}

  /* reviews */
  .reviews{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;max-width:960px;margin:0 auto}
  .rev{text-align:center;padding:10px}
  .rev .stars{color:var(--gold);letter-spacing:3px;font-size:15px;margin-bottom:14px}
  .rev q{font-family:Fraunces,serif;font-size:19px;font-style:italic;line-height:1.5;color:var(--ink);quotes:none;display:block;margin:0 0 16px}
  .rev .who{font-size:13px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}

  /* CTA */
  .cta{position:relative;background:var(--dark);color:#fff;text-align:center;padding:clamp(56px,9vw,110px) 20px;isolation:isolate;overflow:hidden}
  .cta .glow{position:absolute;inset:0;z-index:-1;background:radial-gradient(60% 90% at 50% 0%,color-mix(in srgb,var(--accent) 42%,transparent),transparent 62%)}
  .cta h2{font-size:clamp(30px,4.6vw,54px);line-height:1.04;margin:0}
  .cta p{margin:16px auto 0;max-width:44ch;font-size:17px;color:rgba(255,255,255,.82)}
  .cta .row{margin-top:32px;display:flex;flex-wrap:wrap;gap:14px;justify-content:center}

  /* footer */
  .ft{background:var(--dark-2);color:rgba(255,255,255,.72);padding:56px 0 30px;text-align:center}
  .ft .brand{color:#fff;display:block;margin-bottom:14px}
  .ft p{font-size:14.5px;line-height:1.9;margin:0}
  .ft .row{display:flex;flex-wrap:wrap;gap:6px 24px;justify-content:center;margin:14px 0}
  .ft-bottom{border-top:1px solid rgba(255,255,255,.12);padding-top:20px;margin-top:26px;font-size:12.5px;color:rgba(255,255,255,.5)}

  .reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease}
  .reveal.in{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none}.hero .img img{animation:none}}

  /* harness */
  .harness{position:fixed;z-index:200;left:50%;transform:translateX(-50%);bottom:14px;display:flex;gap:7px;align-items:center;background:#0f172a;color:#fff;padding:9px 11px;border-radius:13px;box-shadow:0 18px 50px rgba(0,0,0,.45);font-family:Inter,sans-serif;font-size:12.5px;flex-wrap:wrap;justify-content:center;max-width:94vw}
  .harness .lbl{color:#8b97a9;font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:10.5px}
  .harness button{background:#1e293b;color:#cbd5e1;border:1px solid #334155;border-radius:8px;padding:7px 11px;font-size:12.5px;font-weight:600;cursor:pointer}
  .harness button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .harness .sep{width:1px;height:20px;background:#334155;margin:0 3px}
</style>
</head>
<body>
<div class="site" id="site" data-palette="hearth"></div>

<div class="harness">
  <span class="lbl">Business</span>
  <button id="b-full" class="on" onclick="pick('full')">Full-detail</button>
  <button id="b-sparse" onclick="pick('sparse')">Bare-bones</button>
  <span class="sep"></span>
  <span class="lbl">Palette</span>
  <button id="p-hearth" class="on" onclick="pal('hearth')">Hearth</button>
  <button id="p-amber" onclick="pal('amber')">Amber</button>
</div>

<script>
/* curated Food photo library — real photography, all 6000px+ (verified), Unsplash commercial-free */
const U='https://images.unsplash.com/photo-';
const PRESET={
  hero:   'w=3840&h=2160&fit=crop&crop=entropy&q=80&fm=jpg',
  feature:'w=2000&h=2500&fit=crop&crop=entropy&q=80&fm=jpg',
  band:   'w=3840&h=1500&fit=crop&crop=entropy&q=80&fm=jpg'
};
const IMG={
  diner:'1767769355212-afb05fe2a7cc', bbq:'1622665632960-aba7ac089541',
  bakery:'1643944471768-2d2eac3afb6d', coffee:'1445116572660-236099ec97a0',
  brewery:'1778034951254-63452b7b77cd', pizza:'1564936281403-f92f66f89ee0',
  interior:'1777502286903-96d96e5156aa', plated:'1663530761401-15eefb544889'
};

/* §3 DATA CONTRACT (same shape as Trades; food reading of the slots).
   services[] = menu highlights. business.hours added (food needs it — fold into spec). */
const SAMPLES={
  full:{
    template_id:"food", palette:"hearth", copy_tone:"warm",
    business:{name:"Hillside Smokehouse", phone:"(304) 555-0121", service_area:"Downtown Buckhannon, WV", established:2014, hours:"Wed–Sun · 11a–9p"},
    hero:{ image_id:"bbq",
      headline:"Low, slow, and worth the wait.",
      subhead:"Hickory-smoked barbecue, made-from-scratch sides, and sweet tea the way it ought to be.",
      cta_text:"See the menu" },
    about:{ body:"We've been smoking brisket over West Virginia hickory since 2014 — no shortcuts, no microwave, just wood, time, and a whole lot of love. Pull up a chair; you're family here." },
    services:[
      {title:"Hickory Brisket", description:"14 hours over the coals, sliced to order."},
      {title:"Baby Back Ribs", description:"Fall-off-the-bone, dry-rubbed and glazed."},
      {title:"Pulled Pork", description:"Piled high on a brioche bun with slaw."},
      {title:"Smoked Wings", description:"Crispy-skinned and tossed in our house sauce."},
      {title:"Mac & Cheese", description:"Three cheeses, baked golden. A local legend."},
      {title:"Peach Cobbler", description:"Made fresh daily. Get it while it lasts."}
    ],
    trust:{ badges:["Since 2014","Family-Owned","Catering Available"],
      reviews:[
        {quote:"Best brisket I've had this side of Texas. The cobbler alone is worth the drive.", name:"Marcus T.", detail:"Elkins, WV"},
        {quote:"Real-deal barbecue and the friendliest folks in town. We're regulars now.", name:"Janet R.", detail:"Buckhannon, WV"}
      ] },
    contact:{ cta_text:"See the menu", phone_prompt:"Call ahead for large orders & catering", emergency:false }
  },
  sparse:{
    template_id:"food", palette:"hearth", copy_tone:"warm",
    business:{name:"Daybreak Coffee", phone:"(304) 555-0166", service_area:"Weston, WV", established:null, hours:"Daily · 7a–2p"},
    hero:{ image_id:"coffee",
      headline:"Your morning, done right.",
      subhead:"Small-batch coffee and fresh pastries in the heart of town.",
      cta_text:"Visit us" },
    about:{ body:"A cozy corner for good coffee and a slower morning." },
    services:[
      {title:"Pour-Over Coffee", description:"Single-origin, roasted local."},
      {title:"Fresh Pastries", description:"Baked in-house every morning."},
      {title:"Breakfast Sandwiches", description:"On house-made biscuits."}
    ],
    trust:{ badges:[], reviews:[] },
    contact:{ cta_text:"Visit us", phone_prompt:"Open daily from 7am", emergency:false }
  }
};

const cap=(s,n)=>{s=(s==null?'':String(s)).trim();return s.length>n?s.slice(0,n-1).trimEnd()+'…':s;};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const imgTag=(name,preset,alt)=>`<div class="img"><img src="${IMG[name]?(U+IMG[name]+'?'+PRESET[preset]):''}" alt="${esc(alt)}" loading="lazy" onerror="this.style.display='none'"></div>`;

function render(key){
  const d=SAMPLES[key], b=d.business||{};
  const tel='tel:'+String(b.phone||'').replace(/[^0-9+]/g,'');
  const heroImg=d.hero?.image_id&&IMG[d.hero.image_id]?d.hero.image_id:'plated';
  const heroCta=cap(d.hero?.cta_text,20)||'See the menu';
  const contactCta=cap(d.contact?.cta_text,20)||heroCta;
  const phonePrompt=cap(d.contact?.phone_prompt,48)||'Call for hours & reservations';
  const menu=(d.services||[]).slice(0,8);
  const reviews=(d.trust?.reviews||[]).slice(0,3);
  const est=b.established, hours=b.hours;

  document.getElementById('site').innerHTML=`
  <header class="hdr" id="hdr"><div class="wrap hdr-in">
    <div class="brand">${esc(cap(b.name,30))}</div>
    <nav class="nav"><a href="#menu">Menu</a><a href="#about">About</a><a href="#visit">Visit</a></nav>
    <a href="#visit" class="book">${esc(contactCta)}</a>
  </div></header>

  <section class="hero">
    ${imgTag(heroImg,'hero',b.name)}
    <div class="scrim"></div>
    <div class="hero-in">
      <p class="loc">${esc(cap(b.service_area,42))||'West Virginia'}</p>
      <h1>${esc(cap(d.hero?.headline,52))}</h1>
      <p class="tag">${esc(cap(d.hero?.subhead,130))}</p>
      <div class="hero-cta">
        <a href="#menu" class="btn btn--primary">${esc(heroCta)}</a>
        <a href="${tel}" class="btn btn--onlight">☎ ${esc(b.phone||'')}</a>
      </div>
      ${hours?`<div class="hours-chip"><span class="dot"></span> ${esc(cap(hours,40))}</div>`:``}
    </div>
  </section>

  <section class="info"><div class="wrap info-in">
    ${hours?`<div class="info-item"><span class="lbl">Hours</span><span class="val">${esc(cap(hours,28))}</span></div>`:``}
    <div class="info-item"><span class="lbl">Find us</span><span class="val">${esc(cap(b.service_area,28))||'West Virginia'}</span></div>
    <div class="info-item"><span class="lbl">Call</span><span class="val">${esc(b.phone||'')}</span></div>
  </div></section>

  <section class="sec" id="menu"><div class="wrap">
    <div class="head reveal"><p class="kicker">On the menu</p><h2 class="title">What we're known for</h2><div class="rule"></div></div>
    <div class="menu">
      ${menu.map((m,i)=>`<div class="mi reveal" style="transition-delay:${i*40}ms"><div class="mi-l"><h4>${esc(cap(m.title,34))}</h4><p>${esc(cap(m.description,90))}</p></div></div>`).join('')}
    </div>
  </div></section>

  <section class="sec sec--tint" id="about"><div class="wrap">
    <div class="feature">
      <div class="img reveal">${imgTag('plated','feature',b.name+' — from our kitchen')}</div>
      <div class="reveal">
        <p class="kicker">Our story</p>
        <h2>Made with care, served like family.</h2>
        <p>${esc(cap(d.about?.body,320))}</p>
        <a href="#visit" class="btn btn--outline">${esc(contactCta)}</a>
      </div>
    </div>
  </div></section>

  <section class="band">
    ${imgTag('interior','band',b.name+' — come on in')}
    <div class="scrim"></div>
    <div class="inner reveal">
      <h2>“${esc(est?('Serving our neighbors since '+est+'.'):'Pull up a chair — always room for one more.')}”</h2>
      <p class="by">${esc(cap(b.name,40))}</p>
    </div>
  </section>

  ${reviews.length?`
  <section class="sec"><div class="wrap">
    <div class="head reveal"><p class="kicker">Reviews</p><h2 class="title">Folks keep coming back</h2><div class="rule"></div></div>
    <div class="reviews">
      ${reviews.map((r,i)=>`<div class="rev reveal" style="transition-delay:${i*70}ms"><div class="stars">★★★★★</div><q>${esc(cap(r.quote,160))}</q><div class="who">${esc(cap(r.name,26))} · ${esc(cap(r.detail,26))}</div></div>`).join('')}
    </div>
  </div></section>`:``}

  <section class="cta" id="visit">
    <div class="glow"></div>
    <h2>${esc(hours?('Open '+cap(hours,30)):'Come see us.')}</h2>
    <p>${esc(phonePrompt)}.</p>
    <div class="row">
      <a href="${tel}" class="btn btn--primary">☎ ${esc(b.phone||'')}</a>
      <a href="#menu" class="btn btn--onlight">${esc(heroCta)}</a>
    </div>
  </section>

  <footer class="ft"><div class="wrap">
    <span class="brand">${esc(cap(b.name,30))}</span>
    <div class="row"><span>${esc(cap(b.service_area,40))}</span>${hours?`<span>${esc(cap(hours,30))}</span>`:``}<span>${esc(b.phone||'')}</span></div>
    <div class="ft-bottom">© ${esc(cap(b.name,40))}${est?(' · Since '+esc(est)):''} · Site by Veteran AI Websites</div>
  </div></footer>
  `;
  wireScroll();
}

function wireScroll(){
  const hdr=document.getElementById('hdr');
  const onScroll=()=>hdr.classList.toggle('solid',window.scrollY>60);
  window.onscroll=onScroll; onScroll();
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}

let cur='full';
function pick(k){cur=k;render(k);
  document.getElementById('b-full').classList.toggle('on',k==='full');
  document.getElementById('b-sparse').classList.toggle('on',k==='sparse');}
function pal(p){document.getElementById('site').dataset.palette=p;
  document.getElementById('p-hearth').classList.toggle('on',p==='hearth');
  document.getElementById('p-amber').classList.toggle('on',p==='amber');}
render('full');
</script>
</body>
</html>
